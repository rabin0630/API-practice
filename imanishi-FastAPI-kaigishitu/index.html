<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会議室予約 システム管理画面</title>
  <style>
    body { font-family: sans-serif; background-color: #f5f5f5; color: #333; margin: 0; padding: 20px; display: flex; }
    .sidebar { width: 200px; background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-right: 20px; height: fit-content; }
    .menu-button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background-color: #f0f0f0; border: none; border-radius: 4px; cursor: pointer; text-align: left; }
    .menu-button.active { background-color: #007bff; color: white; }
    .main-content { flex: 1; background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .page-section { display: none; }
    .page-section.active { display: block; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .submit-button { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    
    /* テーブルスタイル */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background-color: #f8f9fa; }
    .list-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
  </style>
</head>
<body>

  <div class="sidebar">
    <h3>メニュー</h3>
    <button class="menu-button active" onclick="switchPage('users')">ユーザー管理</button>
    <button class="menu-button" onclick="switchPage('rooms')">会議室管理</button>
    <button class="menu-button" onclick="switchPage('bookings')">予約管理</button>
  </div>

  <div class="main-content">
    <div id="users-page" class="page-section active">
      <h2>ユーザー登録</h2>
      <form onsubmit="submitUserForm(event)">
        <div class="form-group"><label>ユーザー名</label><input type="text" id="userNameInput" required></div>
        <button type="submit" class="submit-button">登録</button>
      </form>
      <div class="list-section">
        <h3>登録済みユーザー一覧</h3>
        <table id="user-table"><thead><tr><th>ID</th><th>ユーザー名</th></tr></thead><tbody></tbody></table>
      </div>
    </div>

    <div id="rooms-page" class="page-section">
      <h2>会議室登録</h2>
      <form onsubmit="submitRoomForm(event)">
        <div class="form-group"><label>会議室名</label><input type="text" id="roomNameInput" required></div>
        <div class="form-group"><label>定員</label><input type="number" id="roomCapacityInput" required></div>
        <button type="submit" class="submit-button">登録</button>
      </form>
      <div class="list-section">
        <h3>登録済み会議室一覧</h3>
        <table id="room-table"><thead><tr><th>ID</th><th>会議室名</th><th>定員</th></tr></thead><tbody></tbody></table>
      </div>
    </div>

    <div id="bookings-page" class="page-section">
      <h2>新規予約</h2>
      <form onsubmit="submitBookingForm(event)">
        <div class="form-group"><label>予約ユーザー</label><select id="userSelect" required></select></div>
        <div class="form-group"><label>会議室</label><select id="roomSelect" required></select></div>
        <div class="form-group"><label>予約人数</label><input type="number" id="bookedNumInput" required></div>
        <div class="form-group"><label>日付</label><input type="date" id="bookingDateInput" required></div>
        <div class="form-group"><label>開始時刻</label><input type="time" id="startTimeInput" value="09:00" required></div>
        <div class="form-group"><label>終了時刻</label><input type="time" id="endTimeInput" value="10:00" required></div>
        <button type="submit" class="submit-button">予約確定</button>
      </form>
      <div class="list-section">
        <h3>現在の予約一覧</h3>
        <table id="booking-table"><thead><tr><th>予約ID</th><th>ユーザー名</th><th>会議室</th><th>人数</th><th>開始</th><th>終了</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    // ページ切り替え
    function switchPage(name) {
      document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.menu-button').forEach(b => b.classList.remove('active'));
      document.getElementById(`${name}-page`).classList.add('active');
      event.target.classList.add('active');
      refreshAllData(); // ページ切り替え時に最新データを取得
    }

    // データの全更新（プルダウンとテーブル）
    async function refreshAllData() {
      const users = await fetch(`${API_BASE}/users`).then(res => res.json());
      const rooms = await fetch(`${API_BASE}/rooms`).then(res => res.json());
      const bookings = await fetch(`${API_BASE}/bookings`).then(res => res.json());

      // ユーザー一覧更新
      updateTable('user-table', users, u => `<td>${u.user_id}</td><td>${u.username}</td>`);
      updateSelect('userSelect', users, u => `<option value="${u.user_id}">${u.username}</option>`);

      // 会議室一覧更新
      updateTable('room-table', rooms, r => `<td>${r.room_id}</td><td>${r.roomname}</td><td>${r.capacity}</td>`);
      updateSelect('roomSelect', rooms, r => `<option value="${r.room_id}">${r.roomname}</option>`);

      // 予約一覧更新（IDだけでなく、紐づく名前を表示したいが、今は簡易的に表示）
      updateTable('booking-table', bookings, b => `
        <td>${b.booking_id}</td><td>UID: ${b.user_id}</td><td>RID: ${b.room_id}</td>
        <td>${b.booked_num}</td><td>${b.start_datetime}</td><td>${b.end_datetime}</td>
      `);
    }

    function updateTable(id, data, htmlFunc) {
      const tbody = document.getElementById(id).querySelector('tbody');
      tbody.innerHTML = data.map(item => `<tr>${htmlFunc(item)}</tr>`).join('');
    }

    function updateSelect(id, data, htmlFunc) {
      const select = document.getElementById(id);
      select.innerHTML = '<option value="">選択してください</option>' + data.map(item => htmlFunc(item)).join('');
    }

    // 登録処理（ユーザー）
    async function submitUserForm(e) {
      e.preventDefault();
      const username = document.getElementById('userNameInput').value;
      await fetch(`${API_BASE}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: 0, username })
      });
      document.getElementById('userNameInput').value = '';
      refreshAllData();
    }

    // 登録処理（会議室）
    async function submitRoomForm(e) {
      e.preventDefault();
      const roomname = document.getElementById('roomNameInput').value;
      const capacity = parseInt(document.getElementById('roomCapacityInput').value);
      await fetch(`${API_BASE}/rooms`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ room_id: 0, roomname, capacity })
      });
      document.getElementById('roomNameInput').value = '';
      document.getElementById('roomCapacityInput').value = '';
      refreshAllData();
    }

    // 登録処理（予約）
    async function submitBookingForm(e) {
      e.preventDefault();
      const data = {
        booking_id: 0,
        user_id: parseInt(document.getElementById('userSelect').value),
        room_id: parseInt(document.getElementById('roomSelect').value),
        booked_num: parseInt(document.getElementById('bookedNumInput').value),
        start_datetime: `${document.getElementById('bookingDateInput').value}T${document.getElementById('startTimeInput').value}:00`,
        end_datetime: `${document.getElementById('bookingDateInput').value}T${document.getElementById('endTimeInput').value}:00`
      };
      const res = await fetch(`${API_BASE}/bookings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) alert("予約に失敗しました。IDが正しいか確認してください。");
      refreshAllData();
    }

    window.onload = () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('bookingDateInput').value = today;
      refreshAllData();
    };
  </script>
</body>
</html>
