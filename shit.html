<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録テスト</title>
    <style>
        body { font-family: sans-serif; margin: 50px; }
        .container { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #message { margin-top: 20px; color: blue; }
    </style>
</head>
<body>

<div class="container">
    <h2>ユーザー登録</h2>
    <label for="username">ユーザー名 (最大12文字)</label>
    <input type="text" id="username" placeholder="例: Rabin">
    <button id="submit">登録する</button>
    <div id="message"></div>
</div>

<script>
    const submitBtn = document.getElementById('submit');
    const messageDiv = document.getElementById('message');

    submitBtn.addEventListener('click', async () => {
        const username = document.getElementById('username').value;

        // 1. フロント側でのバリデーション（schemasと同じルール）
        if (!username || username.length > 12) {
            alert("ユーザー名は1〜12文字で入力してください。");
            return;
        }

        // 2. APIを叩く（Fetch API）
        try {
            const response = await fetch('http://127.0.0.1:8000/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                // バックエンドのschemas.Userに合わせてJSONを送る
                body: JSON.stringify({
                    user_id: 0, // 実際はDBで自動採番されるがschemaに合わせて適当な値を入れる
                    username: username
                }),
            });

            if (response.ok) {
                const result = await response.json();
                messageDiv.innerText = `登録成功！ ID: ${result.user_id}`;
            } else {
                const errorData = await response.json();
                messageDiv.innerText = `登録失敗: ${JSON.stringify(errorData.detail)}`;
            }
        } catch (error) {
            messageDiv.innerText = "エラーが発生しました。サーバーが起動しているか確認してください。";
        }
    });
</script>

</body>
</html>
